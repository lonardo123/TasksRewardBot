<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#020617;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}
.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}
button {
  background:#22c55e;
  color:#000;
  font-size:16px;
  cursor:pointer;
}
.message {
  margin-top:8px;
  font-size:14px;
  color:#22c55e;
}
.error {
  color:#ef4444;
}
table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th, td {
  border:1px solid #334155;
  padding:8px;
  text-align:left;
}
th {
  background:#334155;
}
</style>
</head>

<body>

<h2>⚙️ Investment Admin</h2>

<!-- 🔹 تغيير سعر السهم -->
<div class="card">
  <h3>💰 Change Stock Price</h3>
  <input
    id="price"
    type="number"
    step="0.000001"
    min="0"
    placeholder="New price (e.g. 0.0001)">
  <button onclick="setPrice()">Update Price</button>
  <div id="priceMsg" class="message"></div>
</div>

<!-- 🔹 تغيير الحد الأقصى للشراء -->
<div class="card">
  <h3>🔒 Max Buy Limit</h3>
  <input
    id="max"
    type="number"
    step="1"
    min="0"
    placeholder="Max stocks">
  <button onclick="setMax()">Update Limit</button>
  <div id="maxMsg" class="message"></div>
</div>
<div class="card">
  <h3>📦 Total Available Stocks</h3>
  <input id="totalStocks" type="number" min="0" placeholder="Total stocks">
  <button onclick="setTotalStocks()">Update Total</button>
  <div id="totalMsg" class="message"></div>
</div>

<!-- 🔹 عرض المستخدمين وعدد الأسهم -->
<div class="card">
  <h3>📊 Users Stocks</h3>
  <table id="usersTable">
    <thead>
      <tr>
        <th>User (telegram_id)</th>
        <th>Balance ($)</th>
        <th>Total Stocks</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>


<script>
// =====================
// تحديث سعر السهم
// =====================
async function setPrice(){
  const price = document.getElementById("price").value;
  const msg = document.getElementById("priceMsg");
  msg.textContent = "Updating...";
  msg.className = "message";

  try {
    const res = await fetch('/admin/set-price',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ price })
    });
    const data = await res.json();

    if(data.success){
      msg.textContent = data.message || "✅ Price updated successfully";
    } else {
      msg.textContent = data.message || "❌ Failed to update price";
      msg.classList.add("error");
    }
  } catch(err){
    msg.textContent = "❌ Server error";
    msg.classList.add("error");
  }
}

// =====================
// تحديث الحد الأقصى
// =====================
async function setMax(){
  const max = document.getElementById("max").value;
  const msg = document.getElementById("maxMsg");
  msg.textContent = "Updating...";
  msg.className = "message";

  try {
    const res = await fetch('/admin/set-max',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ max })
    });
    const data = await res.json();

    if(data.success){
      msg.textContent = data.message || "✅ Max buy updated successfully";
    } else {
      msg.textContent = data.message || "❌ Failed to update max buy";
      msg.classList.add("error");
    }
  } catch(err){
    msg.textContent = "❌ Server error";
    msg.classList.add("error");
  }
}
// =====================
// إجمالي الأسهم المتاحة
// =====================  
async function setTotalStocks(){
  const total = document.getElementById("totalStocks").value;
  const msg = document.getElementById("totalMsg");
  msg.textContent = "Updating...";

  try{
    const res = await fetch('/admin/set-total-stocks',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ total })
    });
    const data = await res.json();

    if(data.success){
      msg.textContent = "✅ Total stocks updated";
    }else{
      msg.textContent = data.message || "❌ Error";
      msg.classList.add("error");
    }
  }catch{
    msg.textContent = "❌ Server error";
    msg.classList.add("error");
  }
}

// =====================
// جلب المستخدمين والأسهم
// =====================
async function loadUsersStocks() {
  try {
    const res = await fetch('/admin/users-stocks');
    const users = await res.json();

    const tbody = document.querySelector('#usersTable tbody');
    tbody.innerHTML = '';

    users.forEach(u => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${u.user}</td>
        <td>${Number(u.balance).toFixed(6)}</td>
        <td>${u.total_stocks}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error('❌ Error loading users stocks:', err);
  }
}
// تحميل البيانات عند فتح الصفحة
loadUsersStocks();

// =====================
// 🪙 Auto Price Sync FROM SERVER + Auto Update
// =====================

const GOLD_DIVISOR = 2000;
const PRICE_UPDATE_INTERVAL = 60000; // 60 ثانية
let lastAutoUpdated = null;

async function syncPriceFromServer(){
  try{
    const res = await fetch('/api/gold-price');
    const data = await res.json();

    if(!data.success || !data.goldPrice) {
      console.warn("⚠️ Gold sync: no valid data");
      return;
    }

    // ✅ حساب سعر الوحدة: سعر الأونصة ÷ 2000
    const unitPrice = Number(data.goldPrice / GOLD_DIVISOR).toFixed(6);
    
    // ✅ تحديث حقل السعر
    const priceInput = document.getElementById("price");
    priceInput.value = unitPrice;
    
    // ✅ تمييز الحقل عند التحديث التلقائي
    priceInput.style.borderColor = '#22c55e';
    priceInput.style.boxShadow = '0 0 8px rgba(34,197,94,0.5)';
    setTimeout(() => {
      priceInput.style.borderColor = '';
      priceInput.style.boxShadow = '';
    }, 2000);

    // ✅ الضغط تلقائيًا على زر التحديث (اختياري - يمكن تعطيله)
    // ⚠️ ملاحظة: إذا أردت مراجعة السعر قبل التحديث، احذف السطر التالي
    autoUpdatePrice(); // ← اضغط تلقائيًا

    lastAutoUpdated = new Date();
    console.log(`🪙 Auto-sync: $${data.goldPrice} → Unit: $${unitPrice} @ ${lastAutoUpdated.toLocaleTimeString()}`);
    
  } catch(err){
    console.warn("Server price sync failed:", err);
  }
}

// ✅ دالة تحديث السعر تلقائيًا بعد الجلب
function autoUpdatePrice(){
  const priceInput = document.getElementById("price");
  const msg = document.getElementById("priceMsg");
  
  if(!priceInput.value) return;
  
  // محاكاة ضغط الزر
  setPrice();
  
  // إشعار صغير
  if(msg){
    const original = msg.textContent;
    msg.textContent = "🔄 Auto-updated from gold price";
    msg.style.color = "#22c55e";
    setTimeout(() => {
      msg.textContent = original;
    }, 3000);
  }
}

// 🚀 التشغيل الأولي + التحديث الدوري
loadUsersStocks();
syncPriceFromServer(); // جلب فوري
setInterval(syncPriceFromServer, PRICE_UPDATE_INTERVAL); // كل دقيقة

// ✅ إضافة مؤشر "آخر تحديث" في الواجهة (اختياري)
document.addEventListener('DOMContentLoaded', () => {
  const priceCard = document.querySelector('.card h3');
  if(priceCard && !document.getElementById('autoSyncBadge')){
    const badge = document.createElement('small');
    badge.id = 'autoSyncBadge';
    badge.style.cssText = 'display:block;margin-top:5px;font-size:12px;color:#94a3b8;';
    badge.textContent = '🔄 Auto-sync: every 60s';
    priceCard.parentNode.appendChild(badge);
  }
});
</script>

</body>
</html>
