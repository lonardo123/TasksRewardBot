<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User Dashboard</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}
.dashboard-container{
    padding:20px;
    max-width:900px;
    margin:0 auto;
}
.card{
    background:#111827;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}
.card h3{
    margin:0 0 10px 0;
    font-size:18px;
    color:#38bdf8;
}
.card p{
    margin:0;
    font-size:16px;
    color:white;
}
.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}
.stats .card{
    flex:1;
    min-width:150px;
    text-align:center;
}
.loader{
    text-align:center;
    margin-top:50px;
    font-size:18px;
    color:#38bdf8;
}
.error{
    text-align:center;
    margin-top:50px;
    font-size:18px;
    color:#f87171;
}
</style>
</head>
<body>

<div class="dashboard-container">
    <div id="loader" class="loader">Loading your data...</div>

    <div id="dashboard" style="display:none">
        <div class="card">
            <h3>Name</h3>
            <p id="userName"></p>
        </div>
        <div class="card">
            <h3>Username</h3>
            <p id="userUsername"></p>
        </div>
        <div class="stats">
            <div class="card">
                <h3>Balance</h3>
                <p id="userBalance"></p>
            </div>
            <div class="card">
                <h3>Total Withdrawn</h3>
                <p id="userWithdrawn"></p>
            </div>
        </div>
    </div>

    <div id="errorMsg" class="error" style="display:none"></div>
</div>

<script>
const API = "https://perceptive-victory-production.up.railway.app";
const userId = new URLSearchParams(window.location.search).get("id");

// حماية من أي id غير رقمي
if(!userId || isNaN(userId)){
    document.getElementById("loader").style.display = "none";
    const error = document.getElementById("errorMsg");
    error.style.display = "block";
    error.textContent = "Invalid or missing user id!";
} else {
    fetchDashboard();
}

async function fetchDashboard(){
    try{
        const res = await fetch(`${API}/user/dashboard?id=${userId}`);
        const data = await res.json();

        if(data.success){
            document.getElementById("userName").textContent = data.user.name;
            document.getElementById("userUsername").textContent = data.user.username;
            document.getElementById("userBalance").textContent = "$" + parseFloat(data.user.balance).toFixed(2);
            document.getElementById("userWithdrawn").textContent = "$" + parseFloat(data.totalWithdrawn).toFixed(2);

            document.getElementById("loader").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
        } else {
            document.getElementById("loader").style.display = "none";
            const error = document.getElementById("errorMsg");
            error.style.display = "block";
            error.textContent = "Failed to load data: " + (data.message || "Unknown error");
        }
    } catch(err){
        console.error(err);
        document.getElementById("loader").style.display = "none";
        const error = document.getElementById("errorMsg");
        error.style.display = "block";
        error.textContent = "Error fetching data. Please try again later.";
    }
}
</script>

</body>
</html>
