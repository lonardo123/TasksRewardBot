<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User Dashboard</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}
.dashboard-container{
    padding:20px;
}
.card{
    background:#111827;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}
.card h3{
    margin:0 0 10px 0;
    font-size:18px;
    color:#38bdf8;
}
.card p{
    margin:0;
    font-size:16px;
    color:white;
}
.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}
.stats .card{
    flex:1;
    min-width:150px;
    text-align:center;
}
.loader{
    text-align:center;
    margin-top:50px;
    font-size:18px;
    color:#38bdf8;
}
</style>
</head>
<body>

<div class="dashboard-container">
    <div id="loader" class="loader">Loading your data...</div>

    <div id="dashboard" style="display:none">
        <div class="card">
            <h3>Name</h3>
            <p id="userName"></p>
        </div>
        <div class="card">
            <h3>Username</h3>
            <p id="userUsername"></p>
        </div>
        <div class="stats">
            <div class="card">
                <h3>Balance</h3>
                <p id="userBalance"></p>
            </div>
            <div class="card">
                <h3>Total Withdrawn</h3>
                <p id="userWithdrawn"></p>
            </div>
        </div>
    </div>
</div>

<script>
const API="https://perceptive-victory-production.up.railway.app";
const userId = new URLSearchParams(window.location.search).get("id");

async function fetchDashboard(){
    try{
        const res = await fetch(API+"/user/dashboard?id="+userId);
        const data = await res.json();

        if(data.success){
            document.getElementById("userName").textContent = data.user.name;
            document.getElementById("userUsername").textContent = data.user.username;
            document.getElementById("userBalance").textContent = "$" + parseFloat(data.user.balance).toFixed(2);
            document.getElementById("userWithdrawn").textContent = "$" + parseFloat(data.totalWithdrawn).toFixed(2);

            document.getElementById("loader").style.display="none";
            document.getElementById("dashboard").style.display="block";
        }else{
            document.getElementById("loader").textContent="Failed to load data";
        }
    }catch(err){
        console.error(err);
        document.getElementById("loader").textContent="Error fetching data";
    }
}

fetchDashboard();
</script>

</body>
</html>
